<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — TRACE PAY</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --accent: #58a6ff; --green: #3fb950; --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 400px; padding: 24px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: 3px; }
  .logo p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
  .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; transition: border-color 0.15s; }
  input:focus { outline: none; border-color: var(--accent); }
  .btn { width: 100%; padding: 11px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  .footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .footer a { color: var(--accent); cursor: pointer; }
  .demo-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 20px; font-size: 12px; }
  .demo-box .demo-title { color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .demo-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; color: var(--text); }
  .demo-row .role { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .role-admin { background: rgba(88,166,255,0.15); color: var(--accent); }
  .role-member { background: rgba(63,185,80,0.15); color: var(--green); }
  .demo-cred { font-family: monospace; color: var(--muted); font-size: 11px; }
  .fill-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .fill-btn:hover { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>TRACE PAY</h1>
    <p>B2B建設業 信用インフラ</p>
  </div>
  <div class="card">
    <h2>ログイン</h2>
    <div id="error-msg" class="error"></div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="email" placeholder="example@company.jp" autocomplete="email">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">ログイン</button>
    <div class="footer">
      アカウントをお持ちでない方は <a onclick="location.href='/register'">新規登録</a>
    </div>
  </div>

  <div class="demo-box">
    <div class="demo-title">デモアカウント</div>
    <div class="demo-row">
      <div>
        <span class="role" style="background:rgba(188,140,255,0.15);color:#bc8cff">superadmin</span>
        <span class="demo-cred" style="margin-left:8px">superadmin@tracepay.jp / super1234</span>
      </div>
      <button class="fill-btn" onclick="fill('superadmin@tracepay.jp','super1234')">入力</button>
    </div>
    <div class="demo-row" style="margin-top:6px">
      <div>
        <span class="role role-admin">admin</span>
        <span class="demo-cred" style="margin-left:8px">admin@tracepay.jp / admin1234</span>
      </div>
      <button class="fill-btn" onclick="fill('admin@tracepay.jp','admin1234')">入力</button>
    </div>
    <div class="demo-row" style="margin-top:6px">
      <div>
        <span class="role role-member">member</span>
        <span class="demo-cred" style="margin-left:8px">member@tracepay.jp / member1234</span>
      </div>
      <button class="fill-btn" onclick="fill('member@tracepay.jp','member1234')">入力</button>
    </div>
  </div>
</div>

<script>
function fill(email, pw) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pw;
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!email || !password) { showError('メールアドレスとパスワードを入力してください'); return; }
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
      credentials: 'include'
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'ログインに失敗しました'); return; }
    location.href = '/';
  } catch (e) {
    showError('サーバーに接続できませんでした');
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
